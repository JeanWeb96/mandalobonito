<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#C59D5F" />

    <title>Mándalo Bonito | Joyas y Decoración en Resina Artesanal</title>
    <meta name="description" content="Arte en resina hecho a mano. Lámparas personalizadas, juegos de ajedrez y joyería exclusiva con acabados brillantes.">
    <meta name="keywords" content="resina, artesanía, personalización, decoración, joyería, Mándalo Bonito">

    <!-- Open Graph -->
    <meta property="og:title" content="Mándalo Bonito | Resina de Alta Calidad" />
    <meta property="og:description" content="Piezas únicas personalizadas para regalar o decorar tu hogar con un toque brillante." />
    <meta property="og:image" content="https://storage.googleapis.com/prompt-engineering-agent-prompts/prod/268f7601-527e-462f-90e9-a864ed075677/image.jpg" />

    <!-- Favicon circular (igual que el logo del header) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon-180.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Preconnect críticos: DNS+TLS resueltos antes de que se necesiten -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://kvwdjwdbfqqyokvqqseq.supabase.co" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">

    <!-- LCP: el logo es el elemento de mayor contenido visible — lo descubrimos desde el HTML
         para que el browser lo empiece a descargar sin esperar a que cargue el JS -->
    <link rel="preload" as="image" href="/img/logomb.webp" fetchpriority="high">

    <!-- Fuentes no bloqueantes (display=optional: sin reflow al cargar → 0 CLS de fuentes)
         Sin <link rel="preload as="style"> porque ese hint crea una cadena crítica extra -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=optional"
      media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=optional">
    </noscript>

    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-brand-cream selection:bg-brand-gold/20">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
